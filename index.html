<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>机电一体化技术专业调研问卷</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background:#f0f4f8; color:#333; line-height:1.6; min-height:100vh; }
.container { max-width:700px; margin:0 auto; padding:16px; padding-bottom:80px; }

/* Header */
.header { text-align:center; padding:30px 16px 20px; background:linear-gradient(135deg,#1a6fb5,#2196F3); color:#fff; border-radius:0 0 20px 20px; margin-bottom:20px; }
.header h1 { font-size:22px; font-weight:700; }
.header .sub { font-size:13px; opacity:0.85; margin-top:6px; }

/* Cards */
.cards { display:flex; flex-direction:column; gap:14px; margin-bottom:20px; }
.card { background:#fff; border-radius:14px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); cursor:pointer; transition:transform 0.15s; border-left:5px solid #ccc; display:flex; align-items:center; gap:14px; }
.card:active { transform:scale(0.98); }
.card .icon { font-size:40px; flex-shrink:0; }
.card .info { flex:1; }
.card .info h3 { font-size:16px; font-weight:700; margin-bottom:4px; }
.card .info p { font-size:12px; color:#888; line-height:1.5; }
.card .info .time { font-size:11px; color:#aaa; margin-top:4px; }
.card .arrow { font-size:24px; color:#ccc; }
.card.c1 { border-left-color:#1a6fb5; } .card.c1 h3 { color:#1a6fb5; }
.card.c2 { border-left-color:#27ae60; } .card.c2 h3 { color:#27ae60; }
.card.c3 { border-left-color:#e67e22; } .card.c3 h3 { color:#e67e22; }

/* Form Area */
.form-page { display:none; }
.form-page.active { display:block; }

.section { background:#fff; border-radius:14px; padding:20px; margin-bottom:14px; box-shadow:0 1px 8px rgba(0,0,0,0.04); }
.section-title { font-size:17px; font-weight:700; color:#1a6fb5; margin-bottom:16px; padding-left:12px; border-left:4px solid #1a6fb5; }
.section-subtitle { font-size:14px; color:#888; margin-bottom:14px; }

/* Steps */
.steps { display:flex; justify-content:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.step-dot { width:30px; height:30px; border-radius:50%; background:#e0e0e0; color:#999; font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:600; }
.step-dot.done { background:#1a6fb5; color:#fff; }
.step-dot.cur { background:#2196F3; color:#fff; transform:scale(1.2); }
.step-line { width:24px; height:2px; background:#e0e0e0; align-self:center; }
.step-label { text-align:center; font-size:14px; color:#1a6fb5; font-weight:600; margin:4px 0 16px; }

/* Form Items */
.fitem { margin-bottom:18px; }
.flabel { font-size:14px; font-weight:600; margin-bottom:8px; display:block; color:#444; }
.flabel .req { color:#e74c3c; margin-left:2px; }
.finput, .ftextarea { width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; background:#fafafa; transition:border-color 0.2s; }
.finput:focus, .ftextarea:focus { outline:none; border-color:#1a6fb5; background:#fff; }
.ftextarea { min-height:80px; resize:vertical; }
.opts { display:flex; flex-wrap:wrap; gap:8px; }
.opt { padding:8px 16px; border:1px solid #ddd; border-radius:20px; font-size:13px; color:#666; background:#fafafa; cursor:pointer; user-select:none; transition:all 0.15s; white-space:nowrap; }
.opt.sel { background:#e3f2fd; border-color:#1a6fb5; color:#1a6fb5; font-weight:500; }

/* Rating Table */
.rtable { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; }
.rtable-inner { min-width:500px; }
.rrow { display:flex; border-bottom:1px solid #f0f0f0; }
.rhead { background:#f5f8fb; font-weight:600; font-size:12px; }
.rname { flex:2; padding:10px 8px; font-size:13px; display:flex; align-items:center; }
.rcell { flex:1; padding:10px 4px; text-align:center; font-size:12px; color:#888; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; border-radius:4px; }
.rcell.checked { background:#1a6fb5; color:#fff; font-weight:500; }

/* Buttons */
.btn { display:block; width:100%; padding:14px; text-align:center; border-radius:10px; font-size:16px; font-weight:600; border:none; cursor:pointer; transition:opacity 0.2s; }
.btn:active { opacity:0.85; }
.btn-primary { background:linear-gradient(135deg,#1a6fb5,#2196F3); color:#fff; }
.btn-secondary { background:#fff; color:#1a6fb5; border:2px solid #1a6fb5; }
.btn-success { background:#27ae60; color:#fff; }
.btn-white { background:#fff; color:#1a6fb5; font-size:14px; }
.btns { display:flex; gap:12px; margin-top:20px; }
.btns .btn { flex:1; }

/* Success page */
.success { text-align:center; padding:50px 20px; }
.success .check { font-size:80px; margin-bottom:20px; }
.success h2 { color:#27ae60; margin-bottom:10px; }

/* Back button */
.back-bar { display:flex; align-items:center; gap:8px; padding:10px 0; color:#1a6fb5; font-size:14px; cursor:pointer; margin-bottom:10px; }

/* Toast */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 24px; border-radius:8px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }

/* Loading overlay */
.loading { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(255,255,255,0.9); z-index:9998; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.loading .spinner { width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#1a6fb5;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Status bar */
.status-bar { text-align:center; padding:4px 0; font-size:11px; color:#aaa; }
.status-bar .dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; }
.status-bar .dot.on { background:#27ae60; }
.status-bar .dot.off { background:#ccc; }

/* Footer */
.footer { text-align:center; padding:20px; color:#bbb; font-size:11px; }

/* Copy button */
.copy-btn { background:#f0f0f0; border:none; padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; color:#666; }
.copy-btn:active { background:#ddd; }

@media (max-width:480px) {
  .container { padding:10px; }
  .header { padding:20px 12px 16px; }
  .section { padding:14px; }
  .opt { padding:6px 12px; font-size:12px; }
  .rname { font-size:11px; }
  .rcell { font-size:10px; padding:8px 2px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ==================== HOME PAGE ==================== -->
<div id="page-home" class="form-page active">
  <div class="header">
    <h1>邯郸职业技术学院</h1>
    <div class="sub">机电一体化技术专业调研问卷</div>
    <div style="font-size:11px;opacity:0.7;margin-top:4px;">机电工程系 · 2026年6月</div>
  </div>
  <div class="container">
    <div class="cards">
      <div class="card c1" onclick="openSurvey('enterprise')">
        <div class="icon">🏭</div>
        <div class="info">
          <h3>企业版调研问卷</h3>
          <p>面向用人单位，了解人才需求与岗位能力要求</p>
          <div class="time">⏱ 约10-15分钟</div>
        </div>
        <div class="arrow">›</div>
      </div>
      <div class="card c2" onclick="openSurvey('graduate')">
        <div class="icon">🎓</div>
        <div class="info">
          <h3>毕业生版跟踪调查问卷</h3>
          <p>面向2023-2025届毕业生，了解就业与职业发展</p>
          <div class="time">⏱ 约8-12分钟</div>
        </div>
        <div class="arrow">›</div>
      </div>
      <div class="card c3" onclick="openSurvey('student')">
        <div class="icon">📚</div>
        <div class="info">
          <h3>在校生版学情调研问卷</h3>
          <p>面向2024-2025级在校生，了解学习状况与反馈</p>
          <div class="time">⏱ 约8-12分钟</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </div>
    <div class="status-bar"><span class="dot" id="statusDot"></span> <span id="statusText">检查连接中…</span></div>
    <div class="footer">本问卷数据仅用于专业建设与教学改革分析<br>邯郸职业技术学院 机电工程系 © 2026</div>
  </div>
</div>

<!-- ==================== SURVEY FORM PAGES ==================== -->
<div id="page-survey" class="form-page">
  <div class="container">
    <div class="back-bar" onclick="goHome()">← 返回首页</div>
    <div id="surveyContent"></div>
  </div>
</div>

<!-- ==================== SUCCESS PAGE ==================== -->
<div id="page-success" class="form-page">
  <div class="container">
    <div class="success">
      <div class="check">✅</div>
      <h2>提交成功！</h2>
      <p style="color:#888;margin-bottom:20px;" id="successMsg"></p>
      <p style="color:#aaa;font-size:13px;" id="successId"></p>
      <div style="margin:24px 0;padding:20px;background:#f9f9f9;border-radius:12px;text-align:left;">
        <p style="font-weight:600;margin-bottom:12px;">📢 请将问卷链接转发给更多人：</p>
        <div style="display:flex;gap:8px;">
          <input id="shareUrl" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;" readonly onclick="this.select()">
          <button class="copy-btn" onclick="copyLink()">复制链接</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="goHome()" style="margin-bottom:12px;">填写其他问卷</button>
      <button class="btn btn-white" onclick="openSurvey(currentType)">再填一份同类型问卷</button>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="loading" style="display:none;">
  <div class="spinner"></div>
  <p style="color:#888;">提交中...</p>
</div>

<script>
// ==================== CONFIG ====================
// 将此 URL 替换为你的 Google Apps Script 部署 URL
// 如不配置后端，问卷数据将仅保存在本地浏览器
const SCRIPT_URL = 'https://formspree.io/f/xzdlyjnj';

// ==================== STATE ====================
let currentType = '';
let surveyData = {};
let currentStep = 0;

// ==================== PAGE NAVIGATION ====================
function showPage(id) {
  document.querySelectorAll('.form-page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function openSurvey(type) {
  currentType = type;
  currentStep = 0;
  surveyData = {};
  buildSurveyForm(type);
  showPage('page-survey');
}

function goHome() {
  currentType = '';
  currentStep = 0;
  surveyData = {};
  showPage('page-home');
}

// ==================== TOAST ====================
function toast(msg, duration) {
  duration = duration || 2000;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, duration);
}

// ==================== BACKEND CHECK ====================
function checkBackend() {
  var dot = document.getElementById('statusDot');
  var txt = document.getElementById('statusText');
  if (SCRIPT_URL.includes('formspree.io')) {
    dot.className = 'dot on';
    txt.textContent = '在线 | 数据发送至管理员邮箱';
    return;
  }
  if (!SCRIPT_URL) {
    dot.className = 'dot off'; txt.textContent = '离线模式（数据保存在本地）';
    return;
  }
  fetch(SCRIPT_URL)
    .then(r => r.json())
    .then(d => {
      if (d.code === 0 || d.ok) {
        dot.className = 'dot on';
        txt.textContent = '在线 | 已收集 ' + (d.total || '') + ' 份问卷';
      } else {
        dot.className = 'dot off'; txt.textContent = '后端异常';
      }
    }).catch(function(){
      dot.className = 'dot off'; txt.textContent = '无法连接后端（数据将保存在本地）';
    });
}

// ==================== SURVEY CONFIG ====================
function getSurveyConfig(type) {
  var configs = {
    enterprise: {
      title: '企业版调研问卷',
      steps: ['企业基本信息','人才需求','知识能力素质评价','岗位需求评价','校企合作意向','意见建议'],
      stepCount: 6,
      buildStep: buildEnterpriseStep
    },
    graduate: {
      title: '毕业生版跟踪调查问卷',
      steps: ['基本信息','就业状况','薪资与职业发展','教育教学反馈','总体评价与建议'],
      stepCount: 5,
      buildStep: buildGraduateStep
    },
    student: {
      title: '在校生版学情调研问卷',
      steps: ['基本信息','学情调查','课程满意度评价','教学方法与实训反馈','学习需求与期望'],
      stepCount: 5,
      buildStep: buildStudentStep
    }
  };
  return configs[type];
}

// ==================== BUILD SURVEY FORM ====================
function buildSurveyForm(type) {
  var config = getSurveyConfig(type);
  renderStep(type, 0, config);
}

function renderStep(type, step, config) {
  var html = '<div style="text-align:center;margin-bottom:16px;"><span style="font-size:18px;font-weight:700;color:#1a6fb5;">' + config.title + '</span></div>';

  // Steps indicator
  html += '<div class="steps">';
  for (var i = 0; i < config.stepCount; i++) {
    if (i > 0) html += '<div class="step-line"></div>';
    var cls = i < step ? 'done' : (i === step ? 'cur' : '');
    html += '<div class="step-dot ' + cls + '">' + (i < step ? '✓' : (i+1)) + '</div>';
  }
  html += '</div>';
  html += '<div class="step-label">第' + (step+1) + '步：' + config.steps[step] + '</div>';

  // Step content
  html += config.buildStep(type, step);

  // Buttons
  html += '<div class="btns">';
  if (step > 0) {
    html += '<button class="btn btn-secondary" onclick="prevStep()">上一步</button>';
  }
  if (step < config.stepCount - 1) {
    html += '<button class="btn btn-primary" onclick="nextStep()">下一步</button>';
  } else {
    html += '<button class="btn btn-primary" onclick="submitSurvey()">确认提交问卷</button>';
  }
  html += '</div>';

  document.getElementById('surveyContent').innerHTML = html;
  currentStep = step;
  window.scrollTo(0, 0);

  // Restore saved data
  restoreStepData(type, step);
}

function prevStep() {
  saveStepData(currentType, currentStep);
  if (currentStep > 0) {
    var config = getSurveyConfig(currentType);
    renderStep(currentType, currentStep - 1, config);
  }
}

function nextStep() {
  if (!validateStep(currentType, currentStep)) return;
  saveStepData(currentType, currentStep);
  var config = getSurveyConfig(currentType);
  renderStep(currentType, currentStep + 1, config);
}

// ==================== DATA PERSISTENCE ====================
function saveStepData(type, step) {
  var container = document.getElementById('surveyContent');
  // Save text inputs
  var inputs = container.querySelectorAll('input[type="text"], input[type="number"], textarea');
  for (var i = 0; i < inputs.length; i++) {
    var name = inputs[i].getAttribute('data-name');
    if (name) surveyData[name] = inputs[i].value;
  }
  // Save radio (single select)
  var selectedOpts = container.querySelectorAll('.opt.sel[data-multi="0"], .opt.sel:not([data-multi])');
  for (var j = 0; j < selectedOpts.length; j++) {
    var n = selectedOpts[j].getAttribute('data-name');
    var v = selectedOpts[j].getAttribute('data-value');
    surveyData[n] = v;
  }
  // Save checkbox (multi select)
  var multiNames = {};
  var allMulti = container.querySelectorAll('.opt.sel[data-multi="1"]');
  for (var k = 0; k < allMulti.length; k++) {
    var mn = allMulti[k].getAttribute('data-name');
    if (!multiNames[mn]) multiNames[mn] = [];
    multiNames[mn].push(allMulti[k].getAttribute('data-value'));
  }
  for (var key in multiNames) {
    surveyData[key] = multiNames[key];
  }
  // Save rating cells
  var ratedCells = container.querySelectorAll('.rcell.checked');
  var ratingData = {};
  for (var l = 0; l < ratedCells.length; l++) {
    var rn = ratedCells[l].getAttribute('data-name');
    ratingData[rn] = ratedCells[l].getAttribute('data-value');
  }
  if (Object.keys(ratingData).length > 0) {
    var ratingKey = type === 'enterprise' ? 'p3_ratings' : (type === 'graduate' ? 'p4_ratings' : 'p3_satisfaction');
    surveyData[ratingKey] = Object.assign(surveyData[ratingKey] || {}, ratingData);
  }
}

function restoreStepData(type, step) {
  setTimeout(function(){
    var container = document.getElementById('surveyContent');
    // Restore text inputs
    var inputs = container.querySelectorAll('input[type="text"], input[type="number"], textarea');
    for (var i = 0; i < inputs.length; i++) {
      var name = inputs[i].getAttribute('data-name');
      if (name && surveyData[name]) inputs[i].value = surveyData[name];
    }
    // Restore selection state for all opts
    var opts = container.querySelectorAll('.opt');
    for (var j = 0; j < opts.length; j++) {
      var on = opts[j].getAttribute('data-name');
      var ov = opts[j].getAttribute('data-value');
      var isMulti = opts[j].getAttribute('data-multi') === '1';
      if (isMulti) {
        if (Array.isArray(surveyData[on]) && surveyData[on].indexOf(ov) > -1) {
          opts[j].classList.add('sel');
        }
      } else {
        if (surveyData[on] === ov) opts[j].classList.add('sel');
      }
    }
    // Restore rating cells
    var ratingKey = type === 'enterprise' ? 'p3_ratings' : (type === 'graduate' ? 'p4_ratings' : 'p3_satisfaction');
    var ratings = surveyData[ratingKey] || {};
    var cells = container.querySelectorAll('.rcell');
    for (var k = 0; k < cells.length; k++) {
      var cn = cells[k].getAttribute('data-name');
      if (ratings[cn] && ratings[cn] === cells[k].getAttribute('data-value')) {
        cells[k].classList.add('checked');
      }
    }
  }, 10);
}

// ==================== VALIDATION ====================
function validateStep(type, step) {
  if (type === 'enterprise' && step === 0) {
    var name = document.querySelector('[data-name="q1_name"]');
    if (!name || !name.value.trim()) { toast('请填写企业名称'); return false; }
    if (!surveyData.q2_type && !document.querySelector('[data-name="q2_type"].sel')) { toast('请选择企业性质'); return false; }
  }
  if (type === 'graduate' && step === 0) {
    if (!surveyData.gradYear && !document.querySelector('[data-name="gradYear"].sel')) { toast('请选择毕业年份'); return false; }
  }
  if (type === 'student' && step === 0) {
    if (!surveyData.grade && !document.querySelector('[data-name="grade"].sel')) { toast('请选择年级'); return false; }
  }
  return true;
}

// ==================== EVENT HANDLERS (delegation) ====================
document.addEventListener('click', function(e) {
  // Option toggle
  if (e.target.classList.contains('opt')) {
    var el = e.target;
    var isMulti = el.getAttribute('data-multi') === '1';
    if (isMulti) {
      el.classList.toggle('sel');
    } else {
      // Single select: deselect siblings
      var name = el.getAttribute('data-name');
      var parent = el.parentElement;
      if (parent) {
        var siblings = parent.querySelectorAll('.opt[data-name="' + name + '"]');
        for (var i = 0; i < siblings.length; i++) {
          siblings[i].classList.remove('sel');
        }
      }
      el.classList.toggle('sel');
    }
  }
  // Rating cell
  if (e.target.classList.contains('rcell')) {
    var cell = e.target;
    var name = cell.getAttribute('data-name');
    var value = cell.getAttribute('data-value');
    var row = cell.parentElement;
    if (row) {
      var cells = row.querySelectorAll('.rcell');
      for (var j = 0; j < cells.length; j++) {
        cells[j].classList.remove('checked');
      }
    }
    if (!cell.classList.contains('checked')) {
      cell.classList.add('checked');
    }
  }
});

// ==================== SUBMIT ====================
function submitSurvey() {
  saveStepData(currentType, currentStep);

  if (!confirm('确认提交问卷？提交后将无法修改。')) return;

  var payload = JSON.parse(JSON.stringify(surveyData)); // deep clone
  payload.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

  if (SCRIPT_URL) {
    // Submit to Formspree backend
    document.getElementById('loadingOverlay').style.display = 'flex';
    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: currentType, surveyData: payload })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('loadingOverlay').style.display = 'none';
      if (d.ok || d.code === 0) {
        handleSubmitSuccess(payload, '已发送至管理员邮箱');
      } else {
        saveLocal(currentType, payload);
        handleSubmitSuccess(payload, null);
      }
    })
    .catch(function(err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      console.error('Submit error:', err);
      saveLocal(currentType, payload);
      handleSubmitSuccess(payload, null);
    });
  } else {
    // Local mode
    saveLocal(currentType, payload);
    handleSubmitSuccess(payload);
  }
}

function handleSubmitSuccess(payload, serverId) {
  document.getElementById('successMsg').textContent = '您已完成问卷填写，感谢您的宝贵时间和意见！';
  document.getElementById('successId').textContent = (serverId ? '服务器记录ID: ' + serverId : '数据已保存至本地浏览器');
  document.getElementById('shareUrl').value = window.location.href;
  showPage('page-success');
}

function saveLocal(type, payload) {
  var all = JSON.parse(localStorage.getItem('survey_data') || '{}');
  if (!all[type]) all[type] = [];
  all[type].push({ time: new Date().toISOString(), data: payload });
  localStorage.setItem('survey_data', JSON.stringify(all));
}

// ==================== HTML HELPERS ====================
function s(title) {
  return '<div class="section"><div class="section-title">' + title + '</div>';
}
function es() { return '</div>'; }

function ti(name, label, placeholder, extraStyle) {
  extraStyle = extraStyle || '';
  var html = '<div class="fitem">';
  if (label) html += '<span class="flabel">' + label + '</span>';
  html += '<input type="text" class="finput" data-name="' + name + '" placeholder="' + placeholder + '" style="' + extraStyle + '">';
  html += '</div>';
  return html;
}

function ta(name, label) {
  return '<div class="fitem"><span class="flabel">' + label + '</span><textarea class="ftextarea" data-name="' + name + '" placeholder="请输入..."></textarea></div>';
}

function si(name, label, options) {
  var html = '<div class="fitem"><span class="flabel">' + label + '</span><div class="opts">';
  for (var i = 0; i < options.length; i++) {
    html += '<span class="opt" data-name="' + name + '" data-value="' + options[i] + '">' + options[i] + '</span>';
  }
  html += '</div></div>';
  return html;
}

function mi(name, label, options) {
  var html = '<div class="fitem"><span class="flabel">' + label + '</span><div class="opts">';
  for (var i = 0; i < options.length; i++) {
    html += '<span class="opt" data-name="' + name + '" data-value="' + options[i] + '" data-multi="1">' + options[i] + '</span>';
  }
  html += '</div></div>';
  return html;
}

function ratingTable(name, headers, items) {
  var html = '<div class="rtable"><div class="rtable-inner"><div class="rrow rhead"><div class="rname">评价内容</div>';
  for (var h = 0; h < headers.length; h++) {
    html += '<div class="rcell">' + headers[h] + '</div>';
  }
  html += '</div>';
  for (var i = 0; i < items.length; i++) {
    html += '<div class="rrow"><div class="rname">' + (i+1) + '. ' + items[i] + '</div>';
    for (var j = 0; j < headers.length; j++) {
      html += '<div class="rcell" data-name="' + name + '_k' + i + '" data-value="' + headers[j] + '">' + headers[j] + '</div>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}
